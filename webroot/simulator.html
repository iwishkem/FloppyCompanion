<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FloppyCompanion WebUI Simulator</title>
    <link rel="stylesheet" href="vendor/beercss/dist/cdn/beer.scoped.min.css">
    <style>
        :root {
            --md-primary: #a8c8ff;
            --md-on-primary: #00315f;
            --md-primary-container: #214876;
            --md-on-primary-container: #d6e3ff;
            --md-secondary: #bec6dc;
            --md-on-secondary: #283141;
            --md-secondary-container: #3e4758;
            --md-on-secondary-container: #dae2f9;
            --md-surface: #111318;
            --md-surface-container: #1b1f27;
            --md-surface-container-high: #252b33;
            --md-surface-container-highest: #303640;
            --md-on-surface: #e2e2e9;
            --md-on-surface-variant: #c2c7d2;
            --md-outline: #8c919c;
            --md-outline-variant: #414754;
            --md-scrim: rgba(0, 0, 0, 0.62);
            --md-shadow-1: 0 1px 2px rgba(0, 0, 0, 0.28), 0 2px 6px rgba(0, 0, 0, 0.32);
            --md-shadow-3: 0 8px 20px rgba(0, 0, 0, 0.45);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Noto Sans", "Segoe UI", sans-serif;
            color: var(--md-on-surface);
            background: var(--md-surface);
        }

        body.preview-open {
            overflow: hidden;
        }

        .sim-md3 {
            --primary: var(--md-primary);
            --on-primary: var(--md-on-primary);
            --primary-container: var(--md-primary-container);
            --on-primary-container: var(--md-on-primary-container);
            --secondary: var(--md-secondary);
            --on-secondary: var(--md-on-secondary);
            --secondary-container: var(--md-secondary-container);
            --on-secondary-container: var(--md-on-secondary-container);
            --surface: var(--md-surface);
            --surface-container: var(--md-surface-container);
            --surface-container-high: var(--md-surface-container-high);
            --surface-container-highest: var(--md-surface-container-highest);
            --on-surface: var(--md-on-surface);
            --on-surface-variant: var(--md-on-surface-variant);
            --outline: var(--md-outline);
            --outline-variant: var(--md-outline-variant);
            display: block;
            min-height: 100vh;
        }

        .sim-page {
            width: min(1100px, calc(100% - 26px));
            margin: 16px auto;
            display: grid;
            gap: 16px;
        }

        .config-shell {
            border-radius: 28px;
            background: var(--md-surface-container);
            box-shadow: var(--md-shadow-1);
            padding: 24px;
        }

        .config-shell .title {
            margin: 0;
            color: var(--md-on-surface);
            font-size: clamp(1.45rem, 1.9vw, 2rem);
            line-height: 1.25;
            font-weight: 500;
            letter-spacing: 0;
        }

        .subtitle {
            margin: 8px 0 0;
            color: var(--md-on-surface-variant);
            font-size: 0.98rem;
            line-height: 1.45;
        }

        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
            gap: 12px;
            margin-top: 16px;
        }

        .control {
            display: grid;
            gap: 8px;
        }

        .control label {
            font-size: 0.82rem;
            color: var(--md-on-surface-variant);
            letter-spacing: 0.02em;
        }

        .sim-field {
            border-radius: 12px;
            border: 1px solid var(--md-outline-variant);
            background: var(--md-surface-container-high);
            padding: 0 12px;
            transition: border-color 140ms ease, box-shadow 140ms ease;
        }

        .sim-field:focus-within {
            border-color: var(--md-primary);
            box-shadow: 0 0 0 1px var(--md-primary);
        }

        .sim-field input,
        .sim-field select {
            width: 100%;
            border: 0;
            outline: 0;
            background: transparent;
            color: var(--md-on-surface);
            min-height: 42px;
            font-size: 1rem;
        }

        .sim-field select {
            color-scheme: dark;
        }

        .sim-field select option {
            color: var(--md-on-surface);
            background: var(--md-surface-container-highest);
        }

        .sim-field select option:checked {
            color: var(--md-on-primary-container);
            background: var(--md-primary-container);
        }

        .sim-field input::placeholder {
            color: var(--md-on-surface-variant);
        }

        .actions {
            margin-top: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .launch-btn {
            min-height: 42px;
            padding: 0 18px;
            border: 0;
            border-radius: 999px;
            background: var(--md-primary);
            color: var(--md-on-primary);
            font-weight: 600;
            cursor: pointer;
            transition: filter 120ms ease, transform 120ms ease;
        }

        .launch-btn:hover {
            filter: brightness(1.04);
        }

        .launch-btn:active {
            transform: translateY(1px);
        }

        .launch-btn:focus-visible {
            outline: 2px solid var(--md-primary);
            outline-offset: 2px;
        }

        .sim-overlay {
            position: fixed;
            inset: 0;
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px;
            background: var(--md-scrim);
        }

        .sim-overlay.hidden {
            display: none;
        }

        #overlay-close-btn {
            all: unset;
            position: absolute;
            top: 8px;
            right: 8px;
            color: var(--md-on-surface) !important;
            background: transparent !important;
            border: 0 !important;
            border-radius: 0 !important;
            box-shadow: none !important;
            min-height: 0 !important;
            min-width: 0 !important;
            width: auto;
            height: auto;
            padding: 3px 6px;
            display: inline-block;
            font-size: 1.25rem;
            font-weight: 900;
            font-family: "Noto Sans", "Segoe UI", sans-serif;
            line-height: 1;
            letter-spacing: 0;
            text-transform: uppercase;
            cursor: pointer;
            z-index: 1;
        }

        #overlay-close-btn::before,
        #overlay-close-btn::after {
            display: none !important;
            content: none !important;
        }

        #overlay-close-btn:hover {
            color: var(--md-primary);
            background: transparent !important;
        }

        #overlay-close-btn:focus-visible {
            outline: 2px solid var(--md-primary);
            outline-offset: 2px;
            border-radius: 4px;
        }

        .sim-preview {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        .sim-screen-wrap {
            transform-origin: center center;
            pointer-events: auto;
        }

        .sim-screen {
            width: 420px;
            height: 934px;
            border-radius: 26px;
            overflow: hidden;
            background: #000;
            border: 1px solid var(--md-outline-variant);
            box-shadow: var(--md-shadow-3);
        }

        .sim-screen iframe {
            width: 100%;
            height: 100%;
            border: 0;
            display: block;
            background: #000;
        }

        @media (max-width: 820px) {
            .sim-page {
                width: calc(100% - 14px);
                margin: 8px auto;
            }

            .config-shell {
                border-radius: 22px;
                padding: 14px;
            }

            .config-shell .title {
                font-size: 1.3rem;
            }

            .subtitle {
                font-size: 0.93rem;
            }

            .controls {
                grid-template-columns: 1fr;
            }

            .sim-overlay {
                padding: 5px;
            }

            #overlay-close-btn {
                top: 6px;
                right: 6px;
            }
        }
    </style>
</head>
<body>
    <beer-css class="sim-md3">
        <main class="sim-page">
            <section class="config-shell">
                <h1 class="title">FloppyCompanion WebUI Simulator</h1>
                <p class="subtitle">Configure a simulated device first, then launch the WebUI in an isolated phone-like wrapper.</p>

                <div class="controls">
                    <div class="control">
                        <label for="family">Kernel family</label>
                        <div class="sim-field">
                            <select id="family">
                                <option value="2100" selected>Floppy2100</option>
                                <option value="1280">Floppy1280</option>
                                <option value="trinket">FloppyTrinketMi</option>
                            </select>
                        </div>
                    </div>

                    <div class="control">
                        <label for="device-code">Device codename</label>
                        <div class="sim-field">
                            <input id="device-code" type="text" value="r9s" spellcheck="false">
                        </div>
                    </div>

                    <div class="control">
                        <label for="device-model">Device model label</label>
                        <div class="sim-field">
                            <input id="device-model" type="text" value="Galaxy S21 FE" spellcheck="false">
                        </div>
                    </div>

                    <div class="control">
                        <label for="uname">uname -r</label>
                        <div class="sim-field">
                            <input id="uname" type="text" value="5.4.0-Floppy2100-v1.0-KN-release" spellcheck="false">
                        </div>
                    </div>

                    <div class="control">
                        <label for="resolution">Resolution preset</label>
                        <div class="sim-field">
                            <select id="resolution">
                                <option value="1080x2340" selected>1080x2340</option>
                                <option value="1080x2400">1080x2400</option>
                            </select>
                        </div>
                    </div>

                    <div class="control">
                        <label for="dpi">DPI</label>
                        <div class="sim-field">
                            <input id="dpi" type="number" min="120" max="960" step="1" value="411">
                        </div>
                    </div>
                </div>

                <div class="actions">
                    <button id="launch-btn" type="button" class="launch-btn">Launch Simulator</button>
                </div>
            </section>
        </main>

        <section id="sim-overlay" class="sim-overlay hidden" aria-hidden="true">
            <button id="overlay-close-btn" type="button" aria-label="Back to config">X</button>
            <div class="sim-preview">
                <div class="sim-screen-wrap" id="sim-screen-wrap">
                    <div class="sim-screen" id="sim-screen">
                        <iframe id="sim-frame" src="about:blank" title="FloppyCompanion Simulator"></iframe>
                    </div>
                </div>
            </div>
        </section>
    </beer-css>

    <script>
        (function () {
            const familyEl = document.getElementById('family');
            const deviceCodeEl = document.getElementById('device-code');
            const deviceModelEl = document.getElementById('device-model');
            const unameEl = document.getElementById('uname');
            const resolutionEl = document.getElementById('resolution');
            const dpiEl = document.getElementById('dpi');
            const launchBtn = document.getElementById('launch-btn');

            const simOverlay = document.getElementById('sim-overlay');
            const simFrame = document.getElementById('sim-frame');
            const simScreen = document.getElementById('sim-screen');
            const simScreenWrap = document.getElementById('sim-screen-wrap');
            const overlayCloseBtn = document.getElementById('overlay-close-btn');

            let previewOpen = false;

            const defaults = {
                '2100': {
                    code: 'r9s',
                    model: 'Galaxy S21 FE',
                    uname: '5.4.0-Floppy2100-v1.0-KN-release',
                    kernelName: 'Floppy2100'
                },
                '1280': {
                    code: 'a53x',
                    model: 'Galaxy A53',
                    uname: '5.10.0-Floppy1280-v6.2-KN-release',
                    kernelName: 'Floppy1280'
                },
                'trinket': {
                    code: 'ginkgo',
                    model: 'Redmi Note 8',
                    uname: '4.14.0-FloppyTrinketMi-v2.0b-KN-release',
                    kernelName: 'FloppyTrinketMi'
                }
            };

            function setDefaultsForFamily() {
                const selected = familyEl.value;
                const profile = defaults[selected] || defaults['2100'];
                deviceCodeEl.value = profile.code;
                deviceModelEl.value = profile.model;
                unameEl.value = profile.uname;
            }

            function setPreviewOpen(open) {
                previewOpen = open;
                simOverlay.classList.toggle('hidden', !open);
                simOverlay.setAttribute('aria-hidden', open ? 'false' : 'true');
                document.body.classList.toggle('preview-open', open);
            }

            function getViewportSpec() {
                const res = resolutionEl.value.split('x').map(Number);
                const pxWidth = res[0] || 1080;
                const pxHeight = res[1] || 2340;
                const dpiRaw = parseInt(dpiEl.value, 10);
                const dpi = Number.isFinite(dpiRaw) ? Math.max(120, Math.min(960, dpiRaw)) : 411;
                dpiEl.value = String(dpi);

                const cssWidth = Math.round((pxWidth * 160) / dpi);
                const cssHeight = Math.round((pxHeight * 160) / dpi);

                return { pxWidth, pxHeight, dpi, cssWidth, cssHeight };
            }

            function applyViewportMetrics() {
                if (!previewOpen) return;

                const spec = getViewportSpec();
                simScreen.style.width = spec.cssWidth + 'px';
                simScreen.style.height = spec.cssHeight + 'px';

                const inset = window.innerWidth <= 820 ? 14 : 24;
                const availableW = Math.max(260, window.innerWidth - inset);
                const availableH = Math.max(260, window.innerHeight - inset);
                const scale = Math.min(1, availableW / spec.cssWidth, availableH / spec.cssHeight);

                simScreenWrap.style.transform = 'scale(' + scale.toFixed(4) + ')';
            }

            function closePreview() {
                simFrame.src = 'about:blank';
                setPreviewOpen(false);
            }

            function launchSimulator() {
                const selected = familyEl.value;
                const profile = defaults[selected] || defaults['2100'];
                const spec = getViewportSpec();

                const cfg = {
                    family: selected,
                    kernelName: profile.kernelName,
                    deviceCode: String(deviceCodeEl.value || profile.code).trim().toLowerCase(),
                    deviceModel: String(deviceModelEl.value || profile.model).trim(),
                    uname: String(unameEl.value || profile.uname).trim(),
                    resolution: spec.pxWidth + 'x' + spec.pxHeight,
                    dpi: spec.dpi
                };

                const encoded = btoa(JSON.stringify(cfg));
                const url = 'index.html?sim=1&simcfg=' + encodeURIComponent(encoded);

                setPreviewOpen(true);
                applyViewportMetrics();
                simFrame.src = url;
            }

            familyEl.addEventListener('change', setDefaultsForFamily);
            resolutionEl.addEventListener('change', applyViewportMetrics);
            dpiEl.addEventListener('input', applyViewportMetrics);
            window.addEventListener('resize', applyViewportMetrics);

            launchBtn.addEventListener('click', launchSimulator);
            overlayCloseBtn.addEventListener('click', closePreview);

            setDefaultsForFamily();
            setPreviewOpen(false);
        })();
    </script>
</body>
</html>
